name: 发布验签

"on":
  workflow_dispatch:
    inputs:
      version:
        description: 数字点分版本号，例如 2.0.0
        required: true
        type: string
      build:
        description: 数字构建号
        required: true
        default: "1"
        type: string
      notes:
        description: 发布说明
        required: true
        type: string
      publish:
        description: 验证通过后创建并公开 GitHub Release
        required: true
        default: false
        type: boolean
      manual_gate_confirmed:
        description: 已在受保护环境外完成下方全部真机 gate；默认禁止发布
        required: true
        default: false
        type: boolean

# 发布前必须保留并人工完成：
# TextEdit AX 直插；微信 clipboard fallback；Electron 冷启动注入；
# nonactivatingPanel 注入；Apple Speech；火山断网和重连；
# SenseVoice 与 Qwen final；Cloud 旧版更新；Local 旧版更新；更新失败回滚。

permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

concurrency:
  group: muse-release
  queue: max
  cancel-in-progress: false

jobs:
  quality:
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      actions: read
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: 检出仓库
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: 固定并校验 Swift 6.2 工具链
        run: |
          swift --version
          swift --version | grep -F 'Apple Swift version 6.2'

      - name: 限定正式仓库和默认分支
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EXPECTED_REPOSITORY: DaliangPro/Muse
        run: |
          [ "$GITHUB_REPOSITORY" = "$EXPECTED_REPOSITORY" ]
          [ "$GITHUB_REF_NAME" = "$DEFAULT_BRANCH" ]

      - name: 发布请求必须确认手动 gate
        env:
          MANUAL_GATE_CONFIRMED: ${{ inputs.manual_gate_confirmed }}
          PUBLISH_REQUESTED: ${{ inputs.publish }}
        run: |
          {
            echo '## Muse 发布前真机验收 gate'
            echo
            echo "调度者声明全部完成：\`$MANUAL_GATE_CONFIRMED\`"
            echo
            echo '- [ ] TextEdit AX 直插'
            echo '- [ ] 微信 clipboard fallback'
            echo '- [ ] Electron 冷启动注入'
            echo '- [ ] nonactivatingPanel 注入'
            echo '- [ ] Apple Speech'
            echo '- [ ] 火山断网和重连'
            echo '- [ ] SenseVoice 与 Qwen final'
            echo '- [ ] Cloud 旧版更新'
            echo '- [ ] Local 旧版更新'
            echo '- [ ] 更新失败回滚'
            echo
            echo '受保护环境 reviewer 必须依据独立真机记录复核，不得仅依赖调度者勾选。'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$PUBLISH_REQUESTED" = "true" ] && [ "$MANUAL_GATE_CONFIRMED" != "true" ]; then
            echo "发布被拒绝：尚未确认全部真机 gate" >&2
            exit 1
          fi

      - name: 验证版本高于线上最高发布且 updates.json 已同步
        env:
          APP_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-version.sh

      - name: 验证发布环境为受保护且仅允许 main
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-environments.sh

      - name: 配置最小 Python 测试环境
        run: |
          python3 -m venv "$RUNNER_TEMP/muse-python"
          "$RUNNER_TEMP/muse-python/bin/python" -m pip install --disable-pip-version-check \
            fastapi==0.136.3 \
            httpx==0.28.1 \
            numpy==2.4.6 \
            uvicorn==0.49.0
          echo "$RUNNER_TEMP/muse-python/bin" >> "$GITHUB_PATH"

      - name: 完整质量门禁
        run: bash scripts/health-check.sh

  verify-release:
    needs: quality
    runs-on: macos-26
    timeout-minutes: 180
    environment: release-signing
    outputs:
      release_artifact_id: ${{ steps.release_artifact.outputs.artifact-id }}
      release_artifact_digest: ${{ steps.release_artifact.outputs.artifact-digest }}
    permissions:
      actions: read
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: 检出已通过质量门禁的提交
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: 固定并校验 Swift 6.2 工具链
        run: |
          swift --version
          swift --version | grep -F 'Apple Swift version 6.2'

      - name: 复核受保护发布环境
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-environments.sh

      - name: 安装固定版本的冻结服务构建工具
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.30"
          enable-cache: false

      - name: 记录 uv 版本
        run: |
          uv --version

      - name: 构建 SenseVoice 冻结服务
        run: bash scripts/build-sensevoice-server.sh

      - name: 构建 Qwen 冻结服务
        run: bash scripts/build-qwen3-asr-server.sh

      - name: 在无签名密钥环境预构建 Swift 发布二进制
        id: prebuilt_swift
        env:
          MUSE_PACKAGE_PREBUILT_BINARY: ${{ runner.temp }}/muse-release-prebuilt/Muse
        run: |
          bash scripts/prepare-release-binary.sh
          echo "binary=$MUSE_PACKAGE_PREBUILT_BINARY" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$MUSE_PACKAGE_PREBUILT_BINARY" | awk '{print $1}')" \
            >> "$GITHUB_OUTPUT"

      - name: 构建并验证 Cloud 与 Local 发布制品
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          APP_BUILD: ${{ inputs.build }}
          APP_VERSION: ${{ inputs.version }}
          EXPECTED_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          MUSE_PACKAGE_PREBUILT_BINARY: ${{ steps.prebuilt_swift.outputs.binary }}
          MUSE_PACKAGE_PREBUILT_SHA256: ${{ steps.prebuilt_swift.outputs.sha256 }}
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.notes }}
          RELEASE_OUTPUT_DIR: release-output
          RELEASE_VERIFY_MODE: build
        run: bash scripts/run-signed-release-build.sh

      - name: 上传不可变候选制品
        id: release_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: muse-release-${{ inputs.version }}
          path: |
            release-output/Muse-v${{ inputs.version }}-cloud.dmg
            release-output/Muse-v${{ inputs.version }}-local.dmg
            release-output/manifest-fragment.json
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: verify-release
    if: ${{ inputs.publish && inputs.manual_gate_confirmed && needs.verify-release.result == 'success' }}
    runs-on: macos-26
    timeout-minutes: 90
    environment: release
    permissions:
      actions: read
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - name: 检出同一提交
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: 复核受保护发布环境
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-environments.sh

      - name: 锚定当前运行上传的 artifact ID 与摘要
        env:
          EXPECTED_ARTIFACT_DIGEST: ${{ needs.verify-release.outputs.release_artifact_digest }}
          EXPECTED_ARTIFACT_ID: ${{ needs.verify-release.outputs.release_artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-artifact.sh

      - name: 下载候选制品
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.verify-release.outputs.release_artifact_id }}
          path: release-output

      - name: 复验跨作业传递后的候选制品
        env:
          APP_BUILD: ${{ inputs.build }}
          APP_VERSION: ${{ inputs.version }}
          EXPECTED_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.notes }}
          RELEASE_OUTPUT_DIR: release-output
          RELEASE_VERIFY_MODE: verify
        run: bash scripts/release-verify.sh

      - name: 公开前重新验证线上最高版本
        env:
          APP_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/verify-release-version.sh

      - name: 拒绝覆盖已有 tag 或 Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "发布被拒绝：tag 已存在" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "发布被拒绝：Release 已存在" >&2
            exit 1
          fi

      - name: 创建草稿、复验远端资产并在成功后公开
        env:
          APP_BUILD: ${{ inputs.build }}
          APP_VERSION: ${{ inputs.version }}
          EXPECTED_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.notes }}
          RELEASE_OUTPUT_DIR: release-output
          RELEASE_TAG: v${{ inputs.version }}
          RELEASE_VERIFY_MODE: verify
        run: |
          PUBLISHED=0
          REMOTE_RELEASE_DIR="$RUNNER_TEMP/muse-remote-release-$GITHUB_RUN_ID"
          RELEASE_MARKER="<!-- muse-workflow-run:$GITHUB_RUN_ID -->"
          RELEASE_NOTES_WITH_MARKER="$RELEASE_NOTES"$'\n\n'"$RELEASE_MARKER"

          trash_path() {
            local path="$1"
            [ -e "$path" ] || [ -L "$path" ] || return 0
            local trash_dir target
            trash_dir="$HOME/.Trash"
            /bin/mkdir -p "$trash_dir"
            target="$trash_dir/$(basename "$path")-$(/bin/date '+%Y%m%d-%H%M%S')-$$"
            while [ -e "$target" ] || [ -L "$target" ]; do target="$target-$RANDOM"; done
            /bin/mv "$path" "$target"
          }

          cleanup_release() {
            local status="$?"
            trap - EXIT HUP INT TERM
            set +e
            if [ "$status" -ne 0 ] && [ "$PUBLISHED" -eq 0 ]; then
              RELEASE_JSON="$(gh api \
                -H 'Accept: application/vnd.github+json' \
                -H 'X-GitHub-Api-Version: 2026-03-10' \
                "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" 2>/dev/null)"
              if printf '%s' "$RELEASE_JSON" | jq -e \
                --arg marker "$RELEASE_MARKER" --arg sha "$GITHUB_SHA" \
                '.draft == true and .target_commitish == $sha and (.body | contains($marker))' \
                >/dev/null 2>&1; then
                gh release delete "$RELEASE_TAG" --yes --cleanup-tag
              fi
            fi
            trash_path "$REMOTE_RELEASE_DIR"
            exit "$status"
          }
          trap cleanup_release EXIT
          trap 'exit 129' HUP
          trap 'exit 130' INT
          trap 'exit 143' TERM

          gh release create "$RELEASE_TAG" \
            "$RELEASE_OUTPUT_DIR/Muse-v${APP_VERSION}-cloud.dmg" \
            "$RELEASE_OUTPUT_DIR/Muse-v${APP_VERSION}-local.dmg" \
            "$RELEASE_OUTPUT_DIR/manifest-fragment.json" \
            --draft \
            --target "$GITHUB_SHA" \
            --title "Muse $APP_VERSION" \
            --notes "$RELEASE_NOTES_WITH_MARKER"

          [ ! -e "$REMOTE_RELEASE_DIR" ] && [ ! -L "$REMOTE_RELEASE_DIR" ]
          /bin/mkdir -p "$REMOTE_RELEASE_DIR"
          gh release download "$RELEASE_TAG" --dir "$REMOTE_RELEASE_DIR"
          RELEASE_OUTPUT_DIR="$REMOTE_RELEASE_DIR" bash scripts/release-verify.sh
          gh release edit "$RELEASE_TAG" --draft=false
          PUBLISHED=1
